<?xml version="1.0" encoding="UTF-8"?>
<!--
  天意 · 老龟形象资产 v1.1
  3 种姿态 (dozing / awake / nodding) 单文件汇总,供设计师查看与工程师复用
  样式:水墨手绘风,圆润、温和、Master Oogway 神态参考
  实现:纯 SVG path,strokeLinecap=round,微抖动模拟笔触
  消费方式:工程实现时取其中一个 <symbol> 通过 <use> 引用
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 320" width="1320" height="320">

  <!-- ============================================
       Common defs: shared color & stroke styles
       ============================================ -->
  <defs>
    <style>
      .ink    { stroke: #2A2520; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .shell  { fill: #8B6F47; stroke: #2A2520; stroke-width: 2.5; stroke-linejoin: round; }
      .skin   { fill: #5A6B45; stroke: #2A2520; stroke-width: 2.5; stroke-linejoin: round; }
      .belly  { fill: #4A5938; stroke: #2A2520; stroke-width: 1.5; stroke-linejoin: round; opacity: 0.85; }
      .scute  { stroke: #2A2520; stroke-width: 1.4; fill: none; stroke-linejoin: round; opacity: 0.6; }
      .iris   { fill: #2A2520; }
      .gleam  { fill: #F0EBE0; }
      .pose-label { font: 500 14px 'Noto Serif TC', 'Songti TC', serif; fill: #8A7F70; letter-spacing: 0.4em; }
    </style>

    <!-- ============================================
         Reusable turtle body (shared across poses)
         ============================================ -->
    <symbol id="turtle-body" viewBox="0 0 400 320">
      <!-- Ground -->
      <path class="ink" stroke-width="1" d="M 30 285 Q 200 278 380 285" opacity="0.3"/>

      <!-- Tail (curled, peeking from back) -->
      <path class="ink" stroke-width="2.2"
            d="M 95 215 Q 70 218 55 230 Q 50 240 60 245"/>

      <!-- Back leg (tucked) -->
      <path class="skin" stroke-width="2"
            d="M 115 250 Q 100 275 95 280 L 102 282 Q 115 280 125 270 Q 130 258 125 250 Z"/>
      <!-- Back leg toe lines -->
      <path class="ink" stroke-width="1" d="M 102 282 L 100 286 M 108 282 L 107 287 M 114 281 L 114 286"/>

      <!-- Front leg (visible, stepping forward) -->
      <path class="skin" stroke-width="2"
            d="M 250 250 Q 270 280 285 282 L 290 280 Q 285 270 277 260 Q 270 252 260 250 Z"/>
      <!-- Front leg toe lines -->
      <path class="ink" stroke-width="1" d="M 280 280 L 281 286 M 286 280 L 288 286 M 290 278 L 293 284"/>

      <!-- Shell underbelly shadow band -->
      <path class="belly" stroke-width="1.5"
            d="M 100 230 Q 200 248 290 230 L 285 240 Q 200 258 105 240 Z"/>

      <!-- Shell main dome (organic curve, not perfect ellipse) -->
      <path class="shell" stroke-width="3"
            d="M 95 235
               C 90 175, 110 130, 145 115
               C 180 100, 220 100, 260 118
               C 290 132, 305 175, 295 235
               C 230 248, 165 248, 95 235 Z"/>

      <!-- Shell ridge / spine line -->
      <path class="ink" stroke-width="1.3" opacity="0.45"
            d="M 195 110 Q 197 165 198 220"/>

      <!-- Hexagonal scutes (asymmetric, hand-drawn feel) -->
      <g class="scute">
        <!-- Top center -->
        <path d="M 175 125 L 195 117 L 218 117 L 232 130 L 220 148 L 192 147 Z"/>
        <!-- Left upper -->
        <path d="M 130 158 L 152 145 L 175 152 L 175 175 L 153 183 L 131 175 Z"/>
        <!-- Right upper -->
        <path d="M 232 152 L 255 148 L 275 162 L 268 182 L 248 188 L 232 175 Z"/>
        <!-- Left lower -->
        <path d="M 118 195 L 145 187 L 168 195 L 165 218 L 142 222 L 118 213 Z"/>
        <!-- Right lower -->
        <path d="M 232 198 L 257 192 L 280 200 L 275 218 L 252 224 L 232 217 Z"/>
        <!-- Bottom center -->
        <path d="M 170 218 L 195 213 L 222 218 L 218 238 L 195 240 L 172 235 Z"/>
      </g>

      <!-- Subtle shell shading ridges (lighten upper) -->
      <path class="ink" stroke-width="0.8" opacity="0.35"
            d="M 145 130 Q 160 125 178 122"/>
      <path class="ink" stroke-width="0.8" opacity="0.35"
            d="M 222 122 Q 240 125 255 130"/>

      <!-- Neck (extends from shell to head, two parallel curves with wrinkles) -->
      <path class="skin" stroke-width="2.5"
            d="M 290 195
               C 305 188, 320 178, 335 175
               C 360 172, 375 188, 365 215
               C 355 230, 335 232, 320 220
               C 305 215, 295 210, 290 200 Z"/>

      <!-- Neck wrinkle lines -->
      <path class="ink" stroke-width="0.9" opacity="0.55"
            d="M 305 200 Q 315 205 322 207"/>
      <path class="ink" stroke-width="0.9" opacity="0.55"
            d="M 305 210 Q 315 213 320 213"/>
    </symbol>

    <!-- ============================================
         Face details — separate symbols for each state
         ============================================ -->

    <!-- Face: dozing (eye closed, soft expression) -->
    <symbol id="face-dozing" viewBox="0 0 400 320">
      <!-- Closed eye: gentle downward arc with subtle wrinkle above -->
      <path class="ink" stroke-width="2"
            d="M 338 188 Q 348 192 360 188"/>
      <!-- Sleep wrinkle (just below eye) -->
      <path class="ink" stroke-width="0.9" opacity="0.5"
            d="M 340 192 Q 348 195 358 192"/>
      <!-- Eyebrow wrinkle (relaxed, slightly drooping) -->
      <path class="ink" stroke-width="1.6" opacity="0.7"
            d="M 332 178 Q 345 174 365 178"/>
      <!-- Mouth: soft curve, hint of smile -->
      <path class="ink" stroke-width="1.4"
            d="M 360 210 Q 365 213 370 210"/>
      <!-- Beard wisps (4 strands, drooping) -->
      <path class="ink" stroke-width="1.4" opacity="0.85"
            d="M 358 215 Q 355 235 351 255"/>
      <path class="ink" stroke-width="1.2" opacity="0.7"
            d="M 364 215 Q 365 238 363 260"/>
      <path class="ink" stroke-width="1.0" opacity="0.55"
            d="M 370 213 Q 374 230 376 250"/>
      <path class="ink" stroke-width="0.8" opacity="0.4"
            d="M 376 210 Q 382 222 384 235"/>
      <!-- Nostril -->
      <circle cx="372" cy="198" r="0.9" fill="#2A2520" fill-opacity="0.65"/>
    </symbol>

    <!-- Face: awake (eye open, focused, slight smile) -->
    <symbol id="face-awake" viewBox="0 0 400 320">
      <!-- Open eye: large oval iris, pupil, gleam -->
      <ellipse cx="349" cy="187" rx="6" ry="5.5" fill="#F0EBE0" stroke="#2A2520" stroke-width="1.5"/>
      <ellipse cx="350" cy="188" rx="3.6" ry="4" class="iris"/>
      <circle cx="351.4" cy="186.5" r="1.1" class="gleam"/>
      <!-- Eyebrow: slight raise (curious, kind) -->
      <path class="ink" stroke-width="1.7" opacity="0.85"
            d="M 332 174 Q 348 167 366 174"/>
      <!-- Subtle eye-corner wrinkle (wisdom) -->
      <path class="ink" stroke-width="0.9" opacity="0.5"
            d="M 358 192 Q 363 194 368 192"/>
      <!-- Mouth: gentle smile -->
      <path class="ink" stroke-width="1.5"
            d="M 358 210 Q 366 215 374 210"/>
      <!-- Beard wisps (slightly lifted, alive) -->
      <path class="ink" stroke-width="1.4" opacity="0.85"
            d="M 358 215 Q 354 232 348 252"/>
      <path class="ink" stroke-width="1.2" opacity="0.7"
            d="M 364 215 Q 364 234 360 256"/>
      <path class="ink" stroke-width="1.0" opacity="0.55"
            d="M 370 213 Q 372 228 372 248"/>
      <path class="ink" stroke-width="0.8" opacity="0.4"
            d="M 376 210 Q 380 220 380 232"/>
      <!-- Nostril -->
      <circle cx="372" cy="198" r="0.9" fill="#2A2520" fill-opacity="0.65"/>
    </symbol>

    <!-- Face: nodding (eye half-lidded, contemplative, slight nod) -->
    <symbol id="face-nodding" viewBox="0 0 400 320">
      <!-- Half-lidded eye: upper lid line + small visible iris below -->
      <path class="ink" stroke-width="2"
            d="M 338 184 Q 350 184 362 186"/>
      <!-- Small iris peeking below lid -->
      <path class="iris" d="M 346 186 Q 350 191 354 186 L 354 188 Q 350 192 346 188 Z"/>
      <!-- Eyebrow: slight downward (focused) -->
      <path class="ink" stroke-width="1.7" opacity="0.85"
            d="M 332 176 Q 348 173 366 178"/>
      <!-- Eye-corner wrinkle -->
      <path class="ink" stroke-width="0.9" opacity="0.55"
            d="M 358 191 Q 363 193 368 192"/>
      <!-- Mouth: thoughtful, slight closed smile -->
      <path class="ink" stroke-width="1.5"
            d="M 360 210 Q 366 212 372 210"/>
      <!-- Beard (drooping a bit, in thought) -->
      <path class="ink" stroke-width="1.4" opacity="0.85"
            d="M 358 215 Q 356 234 353 256"/>
      <path class="ink" stroke-width="1.2" opacity="0.7"
            d="M 364 215 Q 366 235 365 258"/>
      <path class="ink" stroke-width="1.0" opacity="0.55"
            d="M 370 213 Q 374 228 376 248"/>
      <path class="ink" stroke-width="0.8" opacity="0.4"
            d="M 376 210 Q 382 220 384 232"/>
      <!-- Nostril -->
      <circle cx="372" cy="198" r="0.9" fill="#2A2520" fill-opacity="0.65"/>
    </symbol>
  </defs>

  <!-- ============================================
       Pose 1: Dozing (idle / sleeping state)
       ============================================ -->
  <g transform="translate(0, 0)">
    <!-- Pose label -->
    <text x="200" y="305" text-anchor="middle" class="pose-label">打 盹</text>

    <!-- Body -->
    <use href="#turtle-body"/>
    <!-- Face -->
    <use href="#face-dozing"/>

    <!-- ZZZ floating above (sleeping marker) -->
    <g opacity="0.5">
      <text x="305" y="100" font-family="'Noto Serif TC', serif" font-size="20" fill="#2A2520">Z</text>
      <text x="320" y="80"  font-family="'Noto Serif TC', serif" font-size="15" fill="#2A2520">z</text>
      <text x="332" y="65"  font-family="'Noto Serif TC', serif" font-size="11" fill="#2A2520">z</text>
    </g>
  </g>

  <!-- ============================================
       Pose 2: Awake (active / dialogue state)
       ============================================ -->
  <g transform="translate(440, 0)">
    <text x="200" y="305" text-anchor="middle" class="pose-label">醒 着</text>
    <use href="#turtle-body"/>
    <use href="#face-awake"/>
  </g>

  <!-- ============================================
       Pose 3: Nodding (contemplating / divining state)
       ============================================ -->
  <g transform="translate(880, 0)">
    <text x="200" y="305" text-anchor="middle" class="pose-label">点 头 思 量</text>
    <!-- Slight head tilt for nodding pose: rotate the head/neck region -->
    <use href="#turtle-body"/>
    <g transform="rotate(-3, 350, 195)">
      <use href="#face-nodding"/>
    </g>
  </g>

</svg>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天意 · 小乌龟问卦</title>
<style>
  :root {
    --paper:        #F0EAD8;
    --paper-warm:   #E8DCC5;
    --paper-deep:   #DCC9AE;
    --ink:          #1A1612;
    --ink-soft:     #3D362F;
    --mist:         #8A7F70;
    --mist-light:   #B8AC98;
    --vermillion:   #B23A1F;
    --vermillion-d: #7A1F0C;
    --skin:         #7C8B65;
    --shell:        #9C7E50;
    --serif:  'Noto Serif TC','Source Han Serif TC','Songti TC','STSong',serif;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; font-family: var(--serif); }
  body {
    background: var(--paper);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    display: flex;
    justify-content: center;
  }
  .app {
    width: 100%;
    max-width: 480px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: var(--paper);
    border-left: 1px solid var(--paper-deep);
    border-right: 1px solid var(--paper-deep);
  }

  /* ============================================
     Header — 角色 + 此刻在做什么
     ============================================ */
  .chat-header {
    flex-shrink: 0;
    padding: 16px 20px 14px;
    border-bottom: 1px solid var(--paper-deep);
    background: var(--paper);
    position: sticky;
    top: 0;
    z-index: 5;
  }
  .brand {
    font-size: 11px;
    letter-spacing: 0.6em;
    color: var(--mist);
    margin-bottom: 12px;
  }
  .character {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--paper-warm);
    border: 1px solid var(--ink);
    flex-shrink: 0;
  }
  .character-info { flex: 1; min-width: 0; }
  .character-name {
    font-size: 16px;
    color: var(--ink);
    letter-spacing: 0.25em;
    font-weight: 500;
  }
  .character-status {
    font-size: 11px;
    color: var(--mist);
    letter-spacing: 0.2em;
    margin-top: 3px;
  }
  .character-status::before {
    content: '●';
    color: var(--skin);
    margin-right: 6px;
    font-size: 8px;
    vertical-align: middle;
  }

  /* ============================================
     Chat messages
     ============================================ */
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px 24px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
  }
  .chat-messages::-webkit-scrollbar {
    width: 4px;
  }
  .chat-messages::-webkit-scrollbar-thumb {
    background: var(--paper-deep);
    border-radius: 2px;
  }

  .msg-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    max-width: 100%;
    animation: msg-in 400ms cubic-bezier(0.16, 1, 0.3, 1);
  }
  .msg-row.user { justify-content: flex-end; }

  @keyframes msg-in {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--paper-warm);
    border: 1px solid var(--ink);
    flex-shrink: 0;
    margin-bottom: 2px;
  }

  .bubble {
    padding: 11px 16px;
    border-radius: 16px;
    font-size: 16px;
    line-height: 1.65;
    letter-spacing: 0.04em;
    max-width: 76%;
    word-wrap: break-word;
    font-family: var(--serif);
  }

  /* Turtle bubbles (left, cream) */
  .bubble.turtle {
    background: var(--paper-warm);
    color: var(--ink);
    border-bottom-left-radius: 4px;
    border: 1px solid var(--paper-deep);
  }

  /* User bubbles (right, deeper) */
  .bubble.user {
    background: var(--ink-soft);
    color: var(--paper);
    border-bottom-right-radius: 4px;
  }

  /* VERDICT bubble (朱砂 + seal style) */
  .bubble.verdict {
    background: var(--vermillion);
    color: var(--paper);
    font-size: 38px;
    font-weight: 500;
    letter-spacing: 0.15em;
    padding: 14px 26px 14px 22px;
    border-radius: 8px;
    border: 1px solid var(--vermillion-d);
    box-shadow:
      0 2px 0 var(--vermillion-d),
      0 0 0 3px var(--paper),
      0 0 0 4px var(--vermillion);
    line-height: 1;
    align-self: flex-start;
    transform: rotate(-1.5deg);
    transform-origin: center;
    margin: 4px 0;
    position: relative;
  }
  .bubble.verdict::after {
    content: '籤';
    position: absolute;
    top: -8px;
    right: -8px;
    width: 22px;
    height: 22px;
    background: var(--paper);
    border: 1px solid var(--vermillion);
    color: var(--vermillion);
    font-size: 11px;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 3px;
    transform: rotate(8deg);
    line-height: 1;
  }

  /* Typing indicator */
  .typing {
    display: flex;
    gap: 4px;
    padding: 13px 16px;
    background: var(--paper-warm);
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    border: 1px solid var(--paper-deep);
    align-self: flex-start;
  }
  .typing span {
    width: 6px;
    height: 6px;
    background: var(--mist);
    border-radius: 50%;
    animation: typing-bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes typing-bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30%           { transform: translateY(-4px); opacity: 1; }
  }

  /* ============================================
     Input bar
     ============================================ */
  .input-bar {
    flex-shrink: 0;
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
    border-top: 1px solid var(--paper-deep);
    background: var(--paper);
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .input {
    flex: 1;
    background: var(--paper-warm);
    border: 1px solid var(--paper-deep);
    border-radius: 22px;
    padding: 10px 16px;
    font-family: var(--serif);
    font-size: 16px;
    color: var(--ink);
    outline: none;
    transition: border-color 200ms;
  }
  .input:focus { border-color: var(--ink); }
  .input::placeholder { color: var(--mist-light); }

  .send-btn {
    flex-shrink: 0;
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: 22px;
    padding: 10px 18px;
    font-family: var(--serif);
    font-size: 14px;
    letter-spacing: 0.2em;
    cursor: pointer;
    transition: opacity 200ms;
  }
  .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .send-btn:hover:not(:disabled) { opacity: 0.85; }
</style>
</head>
<body>

<div class="app">

  <!-- Header -->
  <header class="chat-header">
    <div class="brand">天 意</div>
    <div class="character">
      <!-- 小乌龟 avatar (small, front-facing, cute) -->
      <svg class="avatar" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
        <!-- Shell -->
        <ellipse cx="40" cy="52" rx="26" ry="20" fill="#9C7E50" stroke="#1A1612" stroke-width="2"/>
        <!-- Hex pattern hint -->
        <g stroke="#1A1612" stroke-width="0.8" fill="none" opacity="0.35">
          <path d="M 30 42 L 38 40 L 46 40 L 50 46 L 46 52 L 38 52 L 32 48 Z"/>
          <path d="M 22 54 L 30 52 L 32 58 L 28 62 L 22 60 Z"/>
          <path d="M 50 52 L 56 54 L 56 60 L 52 62 L 48 58 Z"/>
        </g>
        <!-- Body / underbelly -->
        <ellipse cx="40" cy="68" rx="14" ry="3" fill="#E8DCC5" stroke="#1A1612" stroke-width="1.2"/>
        <!-- Head -->
        <ellipse cx="40" cy="26" rx="14" ry="13" fill="#7C8B65" stroke="#1A1612" stroke-width="2"/>
        <!-- Eyes (two, big & curious — apprentice feel) -->
        <ellipse cx="35" cy="26" rx="2.4" ry="3" fill="#F5EFE0" stroke="#1A1612" stroke-width="0.6"/>
        <ellipse cx="45" cy="26" rx="2.4" ry="3" fill="#F5EFE0" stroke="#1A1612" stroke-width="0.6"/>
        <ellipse cx="35.4" cy="26.5" rx="1.4" ry="1.9" fill="#1A1612"/>
        <ellipse cx="45.4" cy="26.5" rx="1.4" ry="1.9" fill="#1A1612"/>
        <circle cx="35.8" cy="25.6" r="0.5" fill="#F5EFE0"/>
        <circle cx="45.8" cy="25.6" r="0.5" fill="#F5EFE0"/>
        <!-- Eyebrows (slight, curious) -->
        <path d="M 32 21 Q 35 19 38 21" stroke="#1A1612" stroke-width="1" fill="none" stroke-linecap="round"/>
        <path d="M 42 21 Q 45 19 48 21" stroke="#1A1612" stroke-width="1" fill="none" stroke-linecap="round"/>
        <!-- Smile (small, gentle) -->
        <path d="M 36 33 Q 40 35 44 33" stroke="#1A1612" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      </svg>

      <div class="character-info">
        <div class="character-name">小 乌 龟</div>
        <div class="character-status" id="status">此刻在 抄 经</div>
      </div>
    </div>
  </header>

  <!-- Chat messages -->
  <main class="chat-messages" id="chat"></main>

  <!-- Input bar -->
  <footer class="input-bar">
    <input class="input" id="input" type="text" placeholder="心里那件事…" maxlength="40" autocomplete="off">
    <button class="send-btn" id="send" disabled>发 送</button>
  </footer>

</div>

<script>
  // ============================================
  // 小乌龟人设 + 时辰活动
  // ============================================
  // 老龟出门去了,小乌龟代师听卦。
  // 语气比老龟更轻、更松,偶尔反问,偶尔撒娇式回应。
  // 但 verdict 还是要给——这是产品的「断言」属性。

  const ACTIVITY = (() => {
    const h = new Date().getHours();
    if (h >= 23 || h < 5) return '在 师 傅 旁 边 打 盹';
    if (h < 7)            return '在 院 子 里 扫 落 叶';
    if (h < 11)           return '在 烹 一 壶 茶';
    if (h < 13)           return '在 翻 一 卷 书';
    if (h < 17)           return '此刻在 抄 经';
    if (h < 19)           return '在 看 湖 边 的 鱼';
    if (h < 21)           return '在 听 雨';
    return '在 落 笔 写 字';
  })();

  // 初始招呼(根据时辰微调)
  const GREETING = (() => {
    const h = new Date().getHours();
    if (h >= 23 || h < 5)
      return '夜深了。师傅睡了,我替你听——心里那件事,说罢。';
    if (h < 7)
      return '孩子,你来啦。师傅在练功,我先听着。';
    if (h < 11)
      return '茶刚好。坐这儿说——心里那件事。';
    if (h < 17)
      return '师傅刚出门去了,我替他听。心里那件事,跟我说。';
    if (h < 21)
      return '湖上风好。坐——心里那件事,慢慢说。';
    return '夜深了。心里那件事再压一晚不舒服?说罢。';
  })();

  // verdict + laogui mock 数据(生产换为 /api/divine)
  const ANSWERS = [
    { verdict: '是', laogui: '这事可以做,但前两个月会累。撑过去就顺了。' },
    { verdict: '是', laogui: '出手吧。再拖,你心里那口气会越憋越紧。' },
    { verdict: '是', laogui: '去做吧——这事你已经想了三个月。' },
    { verdict: '是', laogui: '你心里早就有答案,问我不过是要个允许。' },
    { verdict: '否', laogui: '你不是讨厌这件事,是讨厌这阵子的自己。' },
    { verdict: '否', laogui: '别去——做了你会后悔三天。' },
    { verdict: '否', laogui: '这个台子不适合你,体面下来比硬撑好。' },
    { verdict: '否', laogui: '别答应,你只是不好意思拒绝。' },
    { verdict: '缓', laogui: '再陪自己一阵——这事还没到出手的时候。' },
    { verdict: '缓', laogui: '今天先睡一觉。明天再问我一次。' },
    { verdict: '缓', laogui: '过两周再看。你这阵子眼神不对。' },
    { verdict: '缓', laogui: '停一下——你这阵子做太多决定了。' },
  ];

  // 追问的小乌龟回复池(没有 verdict,只是聊)
  const FOLLOWUP_REPLIES = [
    '嗯。',
    '这话告诉我多一点。',
    '你心里其实有答案,只是怕承担,是不是?',
    '再等等——这事不必这周就定。',
    '把它写下来,明天再读一次。',
    '你说这话的时候,自己什么感觉?',
    '师傅说过:急的事都不重要,重要的事都不急。',
    '去喝口水,回来再说。',
    '不必告诉我所有的,讲你最想讲的那一面。',
    '好。这事我替你记着了。',
    '别一个人扛着——找个能聊的人说一次。',
    '换一个角度问自己:如果是我,我会怎么劝我?',
  ];

  // ============================================
  // State + DOM
  // ============================================
  const $chat   = document.getElementById('chat');
  const $input  = document.getElementById('input');
  const $send   = document.getElementById('send');
  const $status = document.getElementById('status');

  $status.textContent = ACTIVITY;

  let hasAskedFirst = false;   // 第一个问题给 verdict,后续给 followup

  // ============================================
  // 渲染函数
  // ============================================
  function addBubble({ side, text, verdict }) {
    const row = document.createElement('div');
    row.className = 'msg-row ' + side;

    // turtle 才有头像
    if (side === 'turtle') {
      const av = document.createElement('div');
      av.className = 'msg-avatar';
      av.innerHTML = `
        <svg viewBox="0 0 80 80" width="32" height="32">
          <ellipse cx="40" cy="52" rx="26" ry="20" fill="#9C7E50" stroke="#1A1612" stroke-width="2"/>
          <ellipse cx="40" cy="26" rx="14" ry="13" fill="#7C8B65" stroke="#1A1612" stroke-width="2"/>
          <ellipse cx="35" cy="26" rx="2" ry="2.6" fill="#1A1612"/>
          <ellipse cx="45" cy="26" rx="2" ry="2.6" fill="#1A1612"/>
          <path d="M 36 33 Q 40 35 44 33" stroke="#1A1612" stroke-width="1.2" fill="none" stroke-linecap="round"/>
        </svg>`;
      row.appendChild(av);
    }

    const bubble = document.createElement('div');
    bubble.className = 'bubble ' + (verdict ? 'verdict' : side);
    bubble.textContent = text;
    row.appendChild(bubble);

    $chat.appendChild(row);
    $chat.scrollTop = $chat.scrollHeight;
    return bubble;
  }

  function addTyping() {
    const row = document.createElement('div');
    row.className = 'msg-row turtle';
    row.id = 'typing-row';
    row.innerHTML = `
      <div class="msg-avatar">
        <svg viewBox="0 0 80 80" width="32" height="32">
          <ellipse cx="40" cy="52" rx="26" ry="20" fill="#9C7E50" stroke="#1A1612" stroke-width="2"/>
          <ellipse cx="40" cy="26" rx="14" ry="13" fill="#7C8B65" stroke="#1A1612" stroke-width="2"/>
          <ellipse cx="35" cy="26" rx="2" ry="2.6" fill="#1A1612"/>
          <ellipse cx="45" cy="26" rx="2" ry="2.6" fill="#1A1612"/>
        </svg>
      </div>
      <div class="typing"><span></span><span></span><span></span></div>`;
    $chat.appendChild(row);
    $chat.scrollTop = $chat.scrollHeight;
  }
  function removeTyping() {
    const t = document.getElementById('typing-row');
    if (t) t.remove();
  }

  // ============================================
  // 流程
  // ============================================
  function initGreeting() {
    setTimeout(() => addBubble({ side: 'turtle', text: GREETING }), 400);
  }

  function userSend() {
    const q = $input.value.trim();
    if (!q) return;
    $input.value = '';
    $send.disabled = true;

    addBubble({ side: 'user', text: q });

    // 小乌龟"思考"延迟
    const thinkMs = 700 + Math.random() * 800;
    setTimeout(() => {
      addTyping();
      setTimeout(() => {
        removeTyping();
        respond(q);
      }, thinkMs);
    }, 300);
  }

  function respond(question) {
    if (!hasAskedFirst) {
      // 第一个问题:给 verdict + laogui
      const ans = ANSWERS[Math.floor(Math.random() * ANSWERS.length)];
      addBubble({ side: 'turtle', text: ans.verdict, verdict: true });
      setTimeout(() => {
        addBubble({ side: 'turtle', text: ans.laogui });
      }, 700);
      hasAskedFirst = true;
    } else {
      // 后续追问:从 followup 池随机
      const reply = FOLLOWUP_REPLIES[Math.floor(Math.random() * FOLLOWUP_REPLIES.length)];
      addBubble({ side: 'turtle', text: reply });
    }
  }

  // ============================================
  // Events
  // ============================================
  $input.addEventListener('input', () => {
    $send.disabled = $input.value.trim().length === 0;
  });
  $input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !$send.disabled) userSend();
  });
  $send.addEventListener('click', userSend);

  initGreeting();
</script>

</body>
</html>
